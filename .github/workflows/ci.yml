name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint, unit & integration tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      # Must run BEFORE actions/setup-node — pnpm needs to exist on the
      # runner before setup-node's `cache: pnpm` option can detect it and
      # find the lockfile to key the cache off of. Version is read from
      # package.json's "packageManager" field automatically, so it stays
      # in sync with what's actually used locally without hardcoding a
      # version number here too (one source of truth instead of two).
      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          # Reads the version from .nvmrc instead of hardcoding it here —
          # keeps CI and local dev on the exact same Node version with one
          # file to update instead of two drifting out of sync.
          node-version-file: ".nvmrc"
          cache: pnpm

      - name: Install dependencies
        # --frozen-lockfile fails the install instead of silently updating
        # pnpm-lock.yaml if it's out of sync with package.json — CI should
        # never modify the lockfile, only verify it's correct.
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        # `tsc -b` (build mode), not `tsc --noEmit` — this project uses
        # TypeScript project references (tsconfig.json points to
        # tsconfig.app.json + tsconfig.node.json), which -b understands
        # and --noEmit alone does not resolve correctly. noEmit is already
        # set inside both referenced tsconfigs, so this only type-checks,
        # it doesn't write any output files.
        run: pnpm exec tsc -b

      - name: Run unit & integration tests with coverage
        env:
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_ANON_KEY: placeholder-anon-key
        run: pnpm coverage  

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: lint-and-test

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium firefox webkit

      # Installs the `supabase` CLI binary onto the runner (separate from
      # the JS ecosystem — this is a standalone Go binary, not an npm
      # package), so we can spin up a REAL local Supabase stack (Postgres,
      # Auth, Edge Functions runtime) via Docker, the same way local dev
      # does with `supabase start`. Without this, the E2E build has no
      # backend to actually talk to.
      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      # Starts the full local stack (Postgres + Auth + Storage + Edge
      # Functions runtime) as Docker containers, using this repo's
      # supabase/config.toml and migrations — same command as local dev.
      # GitHub's ubuntu-latest runners have Docker preinstalled, so no
      # separate Docker setup step is needed.
      - name: Start local Supabase
        run: supabase start

      # supabase/functions/.env holds the dummy Turnstile secret (see
      # GLPDX-129) — same file used for local dev, checked into git
      # ONLY as far as this dummy/public-safe test value goes (never a
      # real secret). Runs in the background (&) since `functions serve`
      # is a long-running foreground process; we capture its PID to stop
      # it cleanly in the cleanup step below, and redirect output to a
      # log file so it doesn't interleave confusingly with the E2E test
      # output but is still available if we need to debug a failure.
      - name: Serve Edge Functions locally
        run: |
          supabase functions serve --env-file supabase/functions/.env > functions-serve.log 2>&1 &
          echo "FUNCTIONS_SERVE_PID=$!" >> "$GITHUB_ENV"
          # Give the Edge Functions runtime a moment to actually start
          # listening before the build/E2E run tries to hit it.
          sleep 5

      # .env.test is gitignored (same reasoning as .env — even though
      # these are non-sensitive/dummy values today, keeping the pattern
      # consistent means a future contributor can't accidentally commit
      # a real secret into this file out of habit). CI writes its own
      # copy fresh each run. VITE_SUPABASE_ANON_KEY here is Supabase's
      # well-known LOCAL DEMO anon key — identical for every local
      # Supabase instance everywhere (it's not a secret, it's baked into
      # the CLI's default config.toml), safe to hardcode in workflow
      # files and version control.
      - name: Create .env.test for E2E build
        run: |
          echo "VITE_SUPABASE_URL=http://127.0.0.1:54321" >> .env.test
          echo "VITE_SUPABASE_ANON_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0" >> .env.test
          echo "VITE_TURNSTILE_SITE_KEY=1x00000000000000000000AA" >> .env.test

      - name: Run E2E tests against local production build
        run: pnpm e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload Edge Functions log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: functions-serve-log
          path: functions-serve.log
          retention-days: 14    

      # Runs even if earlier steps failed, so a failing E2E run doesn't
      # leave orphaned Docker containers / background processes on the
      # runner. GitHub Actions runners are ephemeral and torn down after
      # every job regardless, so this is more about a clean job log /
      # good practice than strictly necessary — but it's cheap insurance.
      - name: Stop Edge Functions and local Supabase
        if: always()
        run: |
          if [ -n "$FUNCTIONS_SERVE_PID" ]; then kill "$FUNCTIONS_SERVE_PID" || true; fi
          supabase stop