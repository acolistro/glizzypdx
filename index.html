<!doctype html>
<!--
  This is the single real HTML page of the app — React takes over
  everything inside <div id="root"> and renders the entire UI into it.
  Vite injects the built JS/CSS bundles into this file automatically;
  you never add <script>/<link> tags here by hand.
-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- No Google Fonts link here, per project privacy rules — any web
         fonts must be self-hosted, not loaded from a third-party server
         that can log requests. -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Find hotdog carts near you in Portland, Oregon — anonymous, no accounts, no tracking."
    />
    <title>GlizzyPDX</title>
  </head>
  <body>
    <div id="root"></div>
    <!-- type="module" is required for Vite's ES module-based dev server
         and build output to work. -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
